<div class="wrapperBuissnes">
  <h2>{{ buissnessData?.title }}</h2>
  <p>{{ buissnessData?.lead }}</p>

  <div appInView class="itemsBuissnes">
    @for (item of buissnessData?.items; track item.title; let i = $index) {
      @if (item.icon) {
        <div class="item">
          <i class="{{ item.icon }}"></i>
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </div>
      }
      @if (item.image) {
        <div class="itemPhoto">
          <img [alt]="item.description" [src]="enviroment.apiUrl + item.image.url" />
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </div>
      }
    }
  </div>
</div>

@if (isActive) {
  <app-hero-page [heroData]="dataVisualIdf?.heroSection" [isLoading]="isActive"></app-hero-page>
  <app-buissnes-page [buissnessData]="dataVisualIdf?.businessSection"></app-buissnes-page>
  <app-scope-page [scopeData]="dataVisualIdf?.scopeSection"></app-scope-page>
  <app-benefits-page
    [benefitsData]="dataVisualIdf?.benefitsSection"
    formatSection="visualIdf"
  ></app-benefits-page>
  <app-mini-hero-page
    [miniHeroData]="dataVisualIdf?.miniHeroSection"
    sideContent="left"
  ></app-mini-hero-page>
  <app-target-page
    [targetData]="dataVisualIdf?.targetSection"
    formatSection="photoSlider"
  ></app-target-page>
  <app-cta-page [ctaData]="dataVisualIdf?.ctaSection"></app-cta-page>
}
@if (!isActive) {
  <app-loader-page></app-loader-page>
}

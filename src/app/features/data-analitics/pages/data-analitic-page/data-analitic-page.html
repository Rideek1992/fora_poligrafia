@if (isActive) {
  <app-hero-page [heroData]="dataAnaliticData?.heroSection" [isLoading]="isActive"></app-hero-page>
  <app-buissnes-page [buissnessData]="dataAnaliticData?.businessSection"></app-buissnes-page>
  <app-scope-page [scopeData]="dataAnaliticData?.scopeSection"></app-scope-page>
  <app-benefits-page
    [benefitsData]="dataAnaliticData?.benefitsSection"
    formatSection="dataAnaliticPage"
  ></app-benefits-page>
  <app-mini-hero-page
    [miniHeroData]="dataAnaliticData?.miniHeroSection"
    sideContent="left"
  ></app-mini-hero-page>
  <app-target-page
    [targetData]="dataAnaliticData?.targetSection"
    formatSection="fourElements"
  ></app-target-page>
  <app-cta-page [ctaData]="dataAnaliticData?.ctaSection"></app-cta-page>
}
@if (!isActive) {
  <app-loader-page></app-loader-page>
}

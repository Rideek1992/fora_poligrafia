@if (isActive) {
  <app-hero-page [heroData]="webServiceData?.heroSection" [isLoading]="isActive"></app-hero-page>
  <app-buissnes-page [buissnessData]="webServiceData?.businessSection"></app-buissnes-page>
  <app-scope-page [scopeData]="webServiceData?.scopeSection"></app-scope-page>
  <app-benefits-page
    [benefitsData]="webServiceData?.benefitsSection"
    formatSection="webServicePage"
  ></app-benefits-page>
  <app-target-page
    [targetData]="webServiceData?.targetSection"
    formatSection="fourElements"
  ></app-target-page>
  <app-mini-hero-page
    [miniHeroData]="webServiceData?.miniHeroSection"
    sideContent="left"
  ></app-mini-hero-page>
  <app-cta-page [ctaData]="webServiceData?.ctaSection"></app-cta-page>
}
@if (!isActive) {
  <app-loader-page></app-loader-page>
}

@if (isLoading) {
  <app-hero-page [heroData]="dataPrint?.heroSection" [isLoading]="isLoading"></app-hero-page>
  <app-buissnes-page [buissnessData]="dataPrint?.businessSection"></app-buissnes-page>
  <app-scope-page [scopeData]="dataPrint?.scopeSection"></app-scope-page>
  <app-benefits-page
    [benefitsData]="dataPrint?.benefitsSection"
    formatSection="threeColumns"
  ></app-benefits-page>
  <app-mini-hero-page [miniHeroData]="dataPrint?.miniHeroSection"></app-mini-hero-page>
  <app-target-page [targetData]="dataPrint?.targetSection"></app-target-page>
  <app-cta-page [ctaData]="dataPrint?.ctaSection"></app-cta-page>
}
@if (!isLoading) {
  <div class="loadingPage">
    <p>ładowanie strony ...</p>
  </div>
}

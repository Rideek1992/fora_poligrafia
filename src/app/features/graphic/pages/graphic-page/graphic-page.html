@if (isLoading) {
  <app-hero-page [heroData]="pageData?.heroSection" [isLoading]="isLoading"></app-hero-page>
  <app-buissnes-page [buissnessData]="pageData?.businessSection"></app-buissnes-page>
  <app-scope-page [scopeData]="pageData?.scopeSection"></app-scope-page>
  <app-benefits-page
    [benefitsData]="pageData?.benefitsSection"
    formatSection="oneColumn"
  ></app-benefits-page>
  <app-target-page [targetData]="pageData?.targetSection"></app-target-page>
  <app-mini-hero-page [miniHeroData]="pageData?.miniHeroSection"></app-mini-hero-page>
  <app-cta-page [ctaData]="pageData?.ctaSection"></app-cta-page>
}
@if (!isLoading) {
  <app-loader-page></app-loader-page>
}
